name: Build & Release SSM-GUI

on:
  push:
    tags:
      - 'v*'

env:
  MAA_FRAMEWORK_VERSION: v5.10.0

jobs:
  build_on_linux_amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Version
        id: version
        run: |
          version=$(echo $GITHUB_REF | cut -d"/" -f3 | sed 's/v//g')
          echo "VERSION=$version" >> $GITHUB_ENV
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld llvm libusb-dev libusb-1.0-0-dev libavformat-dev libavcodec-dev libavutil-dev ninja-build cmake python3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.24

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd gui/frontend
          npm install
          npm run build

      - name: Build
        run: |
          go build -ldflags "-X main.SSM_VERSION=$VERSION" -o ssm-gui

      - name: Build MaaFramework runtime (Linux x64)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CC: clang
          CXX: clang++
        run: |
          git clone --depth 1 --branch "$MAA_FRAMEWORK_VERSION" --recurse-submodules https://github.com/MaaXYZ/MaaFramework.git maa-framework-src
          cd maa-framework-src
          python3 tools/maadeps-download.py x64-linux
          cmake --preset "NinjaMulti Linux x64" -DMAADEPS_TRIPLET="maa-x64-linux"
          cmake --build build --preset "NinjaMulti Linux x64 - Release" -j 8
          cmake --install build --prefix install --config Release

      - name: Copy binary and Maa runtime
        run: |
          mkdir build
          cp ./ssm-gui ./build/
          cp -r ./maa-framework-src/install/bin/. ./build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssm-gui-linux-${{ steps.version.outputs.version }}-amd64
          path: ./build/

  build_on_linux_arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Version
        id: version
        run: |
          version=$(echo $GITHUB_REF | cut -d"/" -f3 | sed 's/v//g')
          echo "VERSION=$version" >> $GITHUB_ENV
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld llvm libusb-dev libusb-1.0-0-dev libavformat-dev libavcodec-dev libavutil-dev ninja-build cmake python3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.24

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd gui/frontend
          npm install
          npm run build

      - name: Build
        run: |
          go build -ldflags "-X main.SSM_VERSION=$VERSION" -o ssm-gui

      - name: Build MaaFramework runtime (Linux arm64)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CC: clang
          CXX: clang++
        run: |
          git clone --depth 1 --branch "$MAA_FRAMEWORK_VERSION" --recurse-submodules https://github.com/MaaXYZ/MaaFramework.git maa-framework-src
          cd maa-framework-src
          python3 tools/maadeps-download.py arm64-linux
          cmake --preset "NinjaMulti Linux arm64" -DMAADEPS_TRIPLET="maa-arm64-linux"
          cmake --build build --preset "NinjaMulti Linux arm64 - Release" -j 8
          cmake --install build --prefix install --config Release

      - name: Copy binary and Maa runtime
        run: |
          mkdir build
          cp ./ssm-gui ./build/
          cp -r ./maa-framework-src/install/bin/. ./build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssm-gui-linux-${{ steps.version.outputs.version }}-arm64
          path: ./build/

  build_on_windows_amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Version
        id: version
        shell: bash
        run: |
          version=$(echo $GITHUB_REF | cut -d"/" -f3 | sed 's/v//g')
          echo "VERSION=$version" >> $GITHUB_ENV
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.24

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        shell: pwsh
        run: |
          cd gui/frontend
          npm install
          npm run build

      - name: Install dependencies
        shell: pwsh
        run: |
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Syu"
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Sy mingw-w64-x86_64-gcc"
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Sy mingw-w64-x86_64-pkgconf"
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Sy mingw-w64-x86_64-libusb"
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Sy mingw-w64-x86_64-ffmpeg"
          C:\msys64\usr\bin\bash -lc "pacman --noconfirm -Sy mingw-w64-x86_64-ntldd"

      - name: Build
        env:
          PKG_CONFIG_PATH: C:\msys64\mingw64\lib\pkgconfig;C:\msys64\msys64\mingw64\share\pkgconfig
        run: |
          $env:PATH = "C:\msys64\mingw64\bin;" + $env:PATH
          go build -ldflags "-X main.SSM_VERSION=$env:VERSION" -o ssm-gui.exe

      - name: Build MaaFramework runtime (Windows x64)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          git clone --depth 1 --branch $env:MAA_FRAMEWORK_VERSION --recurse-submodules https://github.com/MaaXYZ/MaaFramework.git maa-framework-src
          Push-Location maa-framework-src
          python tools/maadeps-download.py x64-windows
          cmake --preset "MSVC 2022" -DMAADEPS_TRIPLET="maa-x64-windows"
          cmake --build build --preset "MSVC 2022 - Release" -j 8
          cmake --install build --prefix install --config Release
          Pop-Location

      - name: Copy exe and dlls
        shell: bash
        run: |
          mkdir build
          cp ./ssm-gui.exe ./build/
          for dll in ./maa-framework-src/install/bin/*.dll; do
            if [ -f "$dll" ]; then
              cp -v "$dll" ./build/
            fi
          done
          for dll in $(/c/msys64/mingw64/bin/ntldd.exe -R ./ssm-gui.exe | awk '{ if ($3 ~ /^C:\\msys64/) print $3; }'); do
            cp -v $dll ./build/
          done

      - name: Upload Artifact (Full)
        uses: actions/upload-artifact@v4
        with:
          name: ssm-gui-windows-${{ steps.version.outputs.version }}-full-amd64
          path: ./build/

      - name: Upload Artifact (Executable only)
        uses: actions/upload-artifact@v4
        with:
          name: ssm-gui-windows-${{ steps.version.outputs.version }}-exe-only-amd64
          path: ./ssm-gui.exe

  build_on_macos_amd64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Version
        id: version
        shell: bash
        run: |
          version=$(echo $GITHUB_REF | cut -d"/" -f3 | sed 's/v//g')
          echo "VERSION=$version" >> $GITHUB_ENV
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          brew install ffmpeg libusb ninja

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.24

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd gui/frontend
          npm install
          npm run build

      - name: Build
        run: |
          go build -ldflags "-X main.SSM_VERSION=$VERSION" -o ssm-gui

      - name: Build MaaFramework runtime (macOS x64)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git clone --depth 1 --branch "$MAA_FRAMEWORK_VERSION" --recurse-submodules https://github.com/MaaXYZ/MaaFramework.git maa-framework-src
          cd maa-framework-src
          python3 tools/maadeps-download.py x64-osx
          cmake --preset "NinjaMulti" -DMAADEPS_TRIPLET="maa-x64-osx" -DCMAKE_OSX_SYSROOT=macosx -DCMAKE_OSX_ARCHITECTURES="x86_64"
          cmake --build build --preset "NinjaMulti - Release" -j 8
          cmake --install build --prefix install --config Release

      - name: Copy binary and Maa runtime
        run: |
          mkdir build
          cp ./ssm-gui ./build/
          cp -r ./maa-framework-src/install/bin/. ./build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssm-gui-darwin-${{ steps.version.outputs.version }}-amd64
          path: ./build/

  build_on_macos_arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Version
        id: version
        shell: bash
        run: |
          version=$(echo $GITHUB_REF | cut -d"/" -f3 | sed 's/v//g')
          echo "VERSION=$version" >> $GITHUB_ENV
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          brew install ffmpeg libusb ninja

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.24

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd gui/frontend
          npm install
          npm run build

      - name: Build
        run: |
          go build -ldflags "-X main.SSM_VERSION=$VERSION" -o ssm-gui

      - name: Build MaaFramework runtime (macOS arm64)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git clone --depth 1 --branch "$MAA_FRAMEWORK_VERSION" --recurse-submodules https://github.com/MaaXYZ/MaaFramework.git maa-framework-src
          cd maa-framework-src
          python3 tools/maadeps-download.py arm64-osx
          cmake --preset "NinjaMulti" -DMAADEPS_TRIPLET="maa-arm64-osx" -DCMAKE_OSX_SYSROOT=macosx -DCMAKE_OSX_ARCHITECTURES="arm64"
          cmake --build build --preset "NinjaMulti - Release" -j 8
          cmake --install build --prefix install --config Release

      - name: Copy binary and Maa runtime
        run: |
          mkdir build
          cp ./ssm-gui ./build/
          cp -r ./maa-framework-src/install/bin/. ./build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssm-gui-darwin-${{ steps.version.outputs.version }}-arm64
          path: ./build/

  github_release:
    runs-on: ubuntu-22.04
    needs:
      - build_on_linux_amd64
      - build_on_linux_arm64
      - build_on_windows_amd64
      - build_on_macos_amd64
      - build_on_macos_arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Version
        shell: bash
        run: |
          version=$(echo $GITHUB_REF | cut -d"/" -f3 | sed 's/v//g')
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds/

      - name: Compress Artifacts
        shell: bash
        run: |
          cd builds
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            builds/*.zip