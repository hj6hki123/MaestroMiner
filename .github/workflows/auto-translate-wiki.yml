name: Translate README to Multi-Language Wiki

on:
  push:
    branches: [ "main" ]
    paths:
      - 'README.md'

permissions:
  contents: write
  models: read

jobs:
  translate_and_publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout Wiki Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo

      - name: Translate to English
        uses: FidelusAleksander/ai-translate-action@v1
        id: trans_en
        with:
          text-file: "main-repo/README.md"
          target-language: "English"
          custom-instructions: "Keep technical terms in English. Don't translate code blocks. Output ONLY the translated markdown content."

      - name: Translate to Traditional Chinese
        uses: FidelusAleksander/ai-translate-action@v1
        id: trans_zh
        with:
          text-file: "main-repo/README.md"
          target-language: "Traditional Chinese"
          custom-instructions: "Keep technical terms in English. Don't translate code blocks. Output ONLY the translated markdown content."

      - name: Translate to Japanese
        uses: FidelusAleksander/ai-translate-action@v1
        id: trans_ja
        with:
          text-file: "main-repo/README.md"
          target-language: "Japanese"
          custom-instructions: "Keep technical terms in English. Don't translate code blocks. Output ONLY the translated markdown content."

      - name: Save Translations to Wiki
        env:
          EN_TEXT: ${{ steps.trans_en.outputs.translated-text }}
          ZH_TEXT: ${{ steps.trans_zh.outputs.translated-text }}
          JA_TEXT: ${{ steps.trans_ja.outputs.translated-text }}
        run: |
          echo "$EN_TEXT" > wiki-repo/Home.md
          echo "$ZH_TEXT" > wiki-repo/Home-zh-TW.md
          echo "$JA_TEXT" > wiki-repo/Home-ja.md

      - name: Push to Wiki
        run: |
          cd wiki-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes in translation, skipping commit."
          else
            git commit -m "docs: auto-translate README to multi-language"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
