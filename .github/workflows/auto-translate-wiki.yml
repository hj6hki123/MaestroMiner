name: Translate README to Multi-Language Wiki

on:
  push:
    branches: [ "main" ]
    paths:
      - 'README.md'

permissions:
  contents: write
  models: read

jobs:
  translate_and_publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Checkout Wiki Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo

      - name: Translate to Traditional Chinese
        uses: FidelusAleksander/ai-translate-action@v1
        id: trans_tc
        with:
          text-file: "main-repo/README.md"
          target-language: "Traditional Chinese"
          custom-instructions: "STRICTLY preserve all Markdown formatting, tables, HTML tags, and code blocks. Do not translate code, variable names, or technical terms. Output ONLY the translated valid markdown content."

      - name: Translate to Simplified Chinese
        uses: FidelusAleksander/ai-translate-action@v1
        id: trans_sc
        with:
          text-file: "main-repo/README.md"
          target-language: "Simplified Chinese"
          custom-instructions: "STRICTLY preserve all Markdown formatting, tables, HTML tags, and code blocks. Do not translate code, variable names, or technical terms. Output ONLY the translated valid markdown content."

      - name: Translate to Japanese
        uses: FidelusAleksander/ai-translate-action@v1
        id: trans_ja
        with:
          text-file: "main-repo/README.md"
          target-language: "Japanese"
          custom-instructions: "STRICTLY preserve all Markdown formatting, tables, HTML tags, and code blocks. Do not translate code, variable names, or technical terms. Output ONLY the translated valid markdown content."

      - name: Save Translations to Wiki
        env:
          TC_TEXT: ${{ steps.trans_tc.outputs.translated-text }}
          SC_TEXT: ${{ steps.trans_sc.outputs.translated-text }}
          JA_TEXT: ${{ steps.trans_ja.outputs.translated-text }}
        run: |
          echo "$TC_TEXT" > wiki-repo/首頁.md
          echo "$SC_TEXT" > wiki-repo/主页.md
          echo "$JA_TEXT" > wiki-repo/ホーム.md

      - name: Push to Wiki
        run: |
          cd wiki-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes in translation, skipping commit."
          else
            git commit -m "docs: auto-translate README to SC, TC, JA"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
